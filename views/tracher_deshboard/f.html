<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Assignment Creator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#4f46e5,#9333ea);
    padding:20px;
}

/* MAIN */
.container{
    max-width:1100px;
    margin:auto;
    text-align:center;
}

h1{
    color:#fff;
    margin-bottom:25px;
}

/* CREATE BUTTON */
.create-btn{
    padding:16px 30px;
    font-size:18px;
    border:none;
    border-radius:14px;
    background:#fff;
    color:#4f46e5;
    cursor:pointer;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* MODAL */
.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.modal-content{
    background:#fff;
    padding:25px;
    border-radius:18px;
    width:100%;
    max-width:500px;
    display:grid;
    gap:15px;
    animation:fade 0.3s ease;
}

.modal-content input,
.modal-content textarea{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ccc;
}

.modal-content textarea{
    min-height:120px;
    resize:none;
}

.modal-content button{
    padding:14px;
    border:none;
    border-radius:12px;
    background:#4f46e5;
    color:#fff;
    cursor:pointer;
}

.close{
    text-align:right;
    cursor:pointer;
    font-size:18px;
}

/* CARDS */
.cards{
    margin-top:30px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

.card{
    background:#fff;
    padding:20px;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    height:320px;              /* 🔥 SAME SIZE FOR ALL CARDS */
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}


.card h3{
    margin-bottom:5px;
}

.meta{
    font-size:13px;
    color:#6b7280;
}

.card p{
    margin:10px 0;
    flex:1;
    overflow-y:auto;          /* 🔥 Scroll if content is long */
    color:#374151;
    line-height:1.6;
}


/* CARD BUTTONS */
.card-actions{
     height: 100px;
    width: 100%;
    display:flex;
    gap:10px;
    margin-top:10px;
}

.card-actions button{
    height: 100px;
    width: 100%;
    flex:1;
    padding:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.edit{
    background:#facc15;
}

.send{
    background:#22c55e;
    color:#fff;
}

@keyframes fade{
    from{opacity:0;transform:scale(0.95);}
    to{opacity:1;transform:scale(1);}
}
</style>
</head>

<body>

<div class="container">
    <h1>📘 Assignment Creator</h1>
    <button class="create-btn" onclick="openModal()">➕ Create Assignment</button>

    <div class="cards" id="cards"></div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <div class="close" onclick="closeModal()">✖</div>

        <input type="text" id="title" placeholder="Assignment Title">
        <input type="text" id="subject" placeholder="Subject Name">
        <input type="text" id="teacher" placeholder="Teacher Name">
        <textarea id="content" placeholder="Write assignment details..."></textarea>

        <button onclick="createAssignment()">Create Card</button>
    </div>
</div>

<script>
let editCard = null;

function openModal(){
    document.getElementById("modal").style.display="flex";
}

function closeModal(){
    document.getElementById("modal").style.display="none";
    clearForm();
    editCard = null;
}

function clearForm(){
    title.value="";
    subject.value="";
    teacher.value="";
    content.value="";
}

function createAssignment(){
    if(!title.value || !subject.value || !teacher.value || !content.value){
        alert("Please fill all details");
        return;
    }

    if(editCard){
        editCard.querySelector("h3").innerText = title.value;
        editCard.querySelector(".meta").innerText =
            `📚 ${subject.value} | 👩‍🏫 ${teacher.value}`;
        editCard.querySelector("p").innerText = content.value;
        closeModal();
        return;
    }

    const card = document.createElement("div");
    card.className="card";

    card.innerHTML=`
        <h3>${title.value}</h3>
        <div class="meta">📚 ${subject.value} | 👩‍🏫 ${teacher.value}</div>
        <p>${content.value}</p>
        <div class="card-actions">
            <button class="edit" onclick="editAssignment(this)">✏️ Edit</button>
            <button class="send" onclick="sendAssignment()">📤 Send</button>
        </div>
    `;

    document.getElementById("cards").prepend(card);
    closeModal();
}

function editAssignment(btn){
    editCard = btn.closest(".card");
    title.value = editCard.querySelector("h3").innerText;
    subject.value = editCard.querySelector(".meta").innerText.split("|")[0].replace("📚","").trim();
    teacher.value = editCard.querySelector(".meta").innerText.split("|")[1].replace("👩‍🏫","").trim();
    content.value = editCard.querySelector("p").innerText;
    openModal();
}

function sendAssignment(){
    alert("✅ Assignment successfully sent to teacher!");
}
</script>

</body>
</html>
